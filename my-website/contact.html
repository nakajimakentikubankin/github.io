<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ｜有限会社 中島建築鈑金</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="屋根・外壁・雨樋工事に関するお問い合わせはこちらから。有限会社中島建築鈑金（群馬県前橋市）">

  css/style.css
</head>

<body>
<div id="wrapper">

  <header>
    <h1>お問い合わせ</h1>
  </header>

  <main>
    <form action="contact.php" method="post" class="contact-form">

      <div class="form-item">
        <>
        <input type="text" name="name" required>
      </div>

      <div class="form-item">
        電話番号
        <input type="tel" name="tel">
      </div>

      <div class="form-item">
        <>
        <input type="email" name="email" required>
      </div>

      <div class="form-item">
        お問い合わせ種別
        <select name="type">
          <option value="屋根工事">屋根工事</option>
          <option value="外壁工事">外壁工事</option>
          <option value="雨樋工事">雨樋工事</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-item">
        お問い合わせ内容
        <textarea name="message" rows="6" required></textarea>
      </div>

      <div class="form-submit">
        <button type="submit">送信する</button>
      </div>

    </form>
  </main>

</div>
</body>
</html>
